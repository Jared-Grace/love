# Version-controlled tmux config. ~/.tmux.conf is a symlink to this file, so
# edits here are live (after `tmux source-file ~/.tmux.conf`) and tracked in git.

# Mouse: select, scroll, resize panes
set -g mouse on

# Copy selection to the system clipboard via xclip (OSC 52 not honored by this terminal)
set -g set-clipboard off

# Drag-select with the mouse copies to the clipboard, then clears the selection (stay in place)
setw -g mode-keys vi
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel 'xclip -selection clipboard -in'

# Let Shift+Enter, desktop notifications, and progress bars pass through to the outer terminal
set -g allow-passthrough on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# Tell tmux the outer terminal accepts OSC 52 clipboard writes (many do but don't advertise it)
set -as terminal-features 'xterm*:clipboard'

# --- Many-Claude status bar: fit all windows on one row, color = "waiting on you" ---

# Reclaim the ~50 chars the default status-left/right reserve (session name,
# pane title, full date) so 13+ windows fit instead of scrolling behind < >.
set -g status-left ''
set -g status-left-length 0
set -g status-right ' %H:%M '
set -g status-right-length 8

# Each window is index + a short name, with a leading * on the selected one.
# Color (painted by the Claude hooks) carries the waiting state; the number is
# your jump target (prefix + N). Paint is asymmetric with clear: red/yellow are
# painted by Claude's Notification/Stop events, but the human's act of answering
# a prompt fires no event, so the reliable clear is FOCUS: viewing a window means
# you handled it. Red = "not yet looked at", clears the instant you focus it.
set -g window-status-format '#I:#{=8:window_name}'
set -g window-status-current-format '*#I:#{=8:window_name}'
set -g window-status-separator ' '

# Focusing a window clears its waiting-color. This is the one event that always
# means "the human has seen it", independent of whether a tool ran next (a
# PostToolUse clear misses deny/plan-select/idle-notification cases) and of
# Notification being overloaded (it fires for idle-waiting too, not just
# permission blocks, so red can appear with nothing to approve).
set -g focus-events on
set-hook -g client-focus-in 'set-option -uw window-status-style ; set-option -uw window-status-current-style'
